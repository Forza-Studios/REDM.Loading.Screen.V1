<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Nevera - Loading Screen</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Rye&family=Vollkorn:ital,wght@0,400;0,600;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="stylesheet" href="css/style.css">
	<script src="js/config.js"></script>
</head>

<body>

	<!-- Video background -->
	<video id="bg-video" autoplay muted loop playsinline></video>
	<div class="film-grain"></div>
	<div class="vignette"></div>

	<div class="layout-container">
		<!-- Top Section -->
		<header class="top-bar">
			<div class="top-left">
				
				<div class="title-container">
					<h1 class="main-title" id="server-main"></h1>
					<h2 class="sub-title" id="server-sub"></h2>
				</div>
			</div>

			

			<div class="top-right">
				<div class="hint-container">
					<h3>Hint</h3>
					<p id="hint-text">Keep your gun holstered in towns to avoid unnecessary trouble.</p>
				</div>
			</div>
		</header>

		<!-- Bottom Section -->
		<footer class="bottom-bar">
			<div class="bottom-left">
				<ul class="social-icons" id="social-row">
					<!-- Filled via JS -->
				</ul>
			</div>

			<div class="bottom-center">
				<div class="progress-container">
					<div class="progress-text" id="telegraph-msg">Loading..</div>
					<div class="progress-bar-wrapper">
						<div class="horse-icon" id="horse-icon">
							<!-- Running horse icon (white) -->
							<img src="https://cdn-icons-png.flaticon.com/512/3358/3358129.png" alt="Horse">
						</div>
						<div class="progress-track">
							<div class="progress-fill" id="progress-pulse"></div>
						</div>
						<div class="progress-pct" id="progress-pct">0%</div>
					</div>
				</div>
			</div>

			<div class="bottom-right">
				<div class="music-player">
					<img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&w=50&q=80" class="album-art" alt="Album Art">
					<div class="music-info">
						<div class="song-title">Lilith</div>
						<div class="song-artist">Goetia</div>
						<div class="playback-time">
							<span class="current-time">0:11</span>
							<div class="time-track">
								<div class="time-fill" style="width: 15%;"></div>
							</div>
							<span class="total-time">4:30</span>
						</div>
					</div>
					<div class="music-controls">
						<button class="music-btn"><i class="bi bi-skip-backward-fill"></i></button>
						<button class="music-btn" id="btn-pause"><i class="bi bi-pause-fill"></i></button>
						<button class="music-btn"><i class="bi bi-skip-forward-fill"></i></button>
						<button class="music-btn"><i class="bi bi-repeat"></i></button>
					</div>
				</div>

				<div class="action-buttons">
					<button class="action-btn" id="btn-music" title="Toggle Music UI"><i class="bi bi-music-note-beamed"></i></button>
					<button class="action-btn" id="btn-keyboard" title="Controls"><i class="bi bi-keyboard"></i></button>
					<button class="action-btn" id="btn-eye" title="Hide UI"><i class="bi bi-eye"></i></button>
					<button class="action-btn btn-close-all" id="btn-close">Close All</button>
				</div>
			</div>
		</footer>
	</div>
	
	<div class="brand-mark-bottom">RedM* (b1491) <i class="bi bi-coin" style="color: #ffd700; font-size: 10px;"></i></div>

	<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
	<script src="js/script.js"></script>
</body>

</html>
