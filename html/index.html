<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Nevera - Loading Screen</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Rye&family=Vollkorn:ital,wght@0,400;0,600;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="stylesheet" href="css/style.css">
	<script src="js/config.js"></script>
</head>

<body>

	<!-- Video background -->
	<video id="bg-video" autoplay muted loop playsinline></video>
	<div class="film-grain"></div>
	<div class="vignette"></div>

	<div class="layout-container">
		<!-- Top Section -->
		<header class="top-bar">
			<div class="top-left">
				
				<div class="title-container">
					<h1 class="main-title" id="server-main"></h1>
					<h2 class="sub-title" id="server-sub"></h2>
				</div>
			</div>

			

			<div class="top-right">
				<div class="hint-container">
					<h3>Hint</h3>
					<p id="hint-text">Keep your gun holstered in towns to avoid unnecessary trouble.</p>
				</div>
			</div>
		</header>

		<!-- Bottom Section -->
		<footer class="bottom-bar">
			<div class="bottom-left">
				<ul class="social-icons" id="social-row">
					<!-- Filled via JS -->
				</ul>
			</div>

			<div class="bottom-center">
				<div class="progress-container">
					<div class="progress-text" id="telegraph-msg"></div>
					<div class="progress-bar-wrapper">
						<div class="horse-icon" id="horse-icon">
							<!-- Running horse icon (white) -->
						</div>
						<div class="progress-track">
							<div class="progress-fill" id="progress-pulse"></div>
						</div>
						<div class="progress-pct" id="progress-pct">0%</div>
					</div>
				</div>
			</div>

			<div class="bottom-right">
				<div class="music-controls">
					<button class="music-btn" id="btn-prev"><i class="bi bi-skip-backward-fill"></i></button>
					<button class="music-btn" id="btn-pause"><i class="bi bi-pause-fill"></i></button>
					<button class="music-btn" id="btn-next"><i class="bi bi-skip-forward-fill"></i></button>
					<div class="volume-container">
						<i class="bi bi-volume-up-fill" id="volume-icon"></i>
						<input type="range" id="volume-slider" min="0" max="100" value="45" class="volume-slider">
					</div>
				</div>

				
			</div>
		</footer>
	</div>
	
	<div class="brand-mark-bottom">RedM* (b1491) <i class="bi bi-coin" style="color: #ffd700; font-size: 10px;"></i></div>

	<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
	<script src="js/script.js"></script>
</body>

</html>
